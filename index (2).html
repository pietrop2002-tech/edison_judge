<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edison Judge Station - Millennium Mobile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Spectral+SC:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ygo-gold: #d4af37;
            --ygo-gold-bright: #fff380;
            --ygo-bronze: #8c7853;
            --bg-dark: #05050a;
            --terminal-green: #33ff33;
            --damage-red: #ff3333;
            --font-main: 'Spectral SC', serif;
            --font-ygi: 'Cinzel Decorative', cursive;
        }

        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0;
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.9)),
                url('https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/13714538-e319-4cce-9062-6941ce18525d/di1yiyl-e886a7b6-f3ad-409a-84c7-8247e4c3f52b.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiIvZi8xMzcxNDUzOC1lMzE5LTRjY2UtOTA2Mi02OTQxY2UxODUyNWQvZGkxeWl5bC1lODg2YTdiNi1mM2FkLTQwOWEtODRjNy04MjQ3eTRjM2Y1MmIucG5nIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.C7I22x3OoxjVYJFs9etHymVbaVQWLeFO5doigmEF8ek');
            background-size: cover; background-attachment: fixed;
            color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column;
        }

        header {
            padding: 10px; text-align: center; border-bottom: 4px solid var(--ygo-gold);
            background: rgba(0,0,0,0.95); z-index: 100;
        }

        h1 { margin: 0; font-family: var(--font-ygi); color: var(--ygo-gold-bright); font-size: 1.4rem; letter-spacing: 2px; }

        .main-layout {
            display: grid; grid-template-columns: 380px 1fr; flex: 1;
        }

        /* LEFT PANEL: JUDGE */
        #bot-panel {
            position: relative; border-right: 6px solid var(--ygo-gold); border-bottom: 6px solid var(--ygo-gold);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 25px; background-color: #111; background-size: cover; background-position: center;
            min-height: 400px;
        }
        #bot-panel::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 1; }
        .judge-content { position: relative; z-index: 2; width: 100%; }
        .judge-logo { width: 80%; max-width: 240px; filter: drop-shadow(0 0 15px gold); margin-bottom: 20px; }

        /* RIGHT PANEL: TOOLS */
        .duel-tools-panel {
            background-color: rgba(0,0,0,0.5); border-bottom: 6px solid var(--ygo-gold);
            display: flex; flex-direction: column; padding: 20px; gap: 15px;
        }

        .players-lp-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 10px; }

        .tool-card {
            background: rgba(15, 15, 15, 0.95); border: 3px solid var(--ygo-gold);
            padding: 15px; border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between;
        }

        .lp-display {
            font-family: var(--font-ygi); font-size: 3.5rem; text-align: center;
            background: #000; border: 1px solid var(--ygo-bronze);
            text-shadow: 0 0 25px currentColor; padding: 10px 0; border-radius: 8px;
        }

        button {
            font-family: var(--font-main); background: linear-gradient(to bottom, #bf9b30, #8c7853);
            color: #000; border: 1px solid #000; padding: 12px; cursor: pointer; font-weight: 800; text-transform: uppercase; border-radius: 4px;
        }
        button:hover { background: var(--ygo-gold-bright); }

        .btn-half { background: #8b0000; color: white; border-color: #f33; font-size: 1.1rem; grid-column: span 2; }
        .btn-reset { background: linear-gradient(#400, #000); color: #f33; border: 2px solid #f33; font-weight: 900; }

        /* BOTTOM ROW */
        .bottom-row { display: grid; grid-template-columns: 1.5fr 1fr 0.8fr; gap: 15px; }

        .timer-card { text-align: center; }
        #timer-display { font-family: var(--font-ygi); font-size: 2rem; color: var(--ygo-gold-bright); margin-bottom: 5px; }
        .timer-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: none; justify-content: center;
            align-items: center; z-index: 1000; flex-direction: column;
        }
        .modal-actions { margin-top: 30px; display: flex; gap: 20px; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 850px) {
            body { overflow-y: auto; }
            .main-layout { grid-template-columns: 1fr; }
            #bot-panel { border-right: none; height: 350px; min-height: 350px; }
            .players-lp-container { grid-template-columns: 1fr; }
            .bottom-row { grid-template-columns: 1fr; }
            .lp-display { font-size: 4rem; }
            header h1 { font-size: 1.1rem; }
        }

        input[type="number"] {
            grid-column: span 2; padding: 12px; background: #000; border: 1px solid var(--ygo-gold); color: #fff; text-align: center; font-size: 1.2rem;
        }
    </style>
</head>
<body>

<header><h1>EDISON JUDGE STATION</h1></header>

<div class="main-layout">
    <aside id="bot-panel">
        <div class="judge-content">
            <img src="https://www.yugioh-card.com/en/wp-content/uploads/2022/11/judge-logo_2022.png" alt="Judge Logo" class="judge-logo">
            <button class="btn-summon" onclick="openJudgeBot()" style="width: 100%; padding: 20px; border-radius: 50px;">OPEN JUDGE BOT</button>
            <label for="file-upload" style="margin-top: 20px; display: block; cursor: pointer; text-decoration: underline; font-size: 0.8rem; color: var(--ygo-gold);">Set Solemn Background</label>
            <input type="file" id="file-upload" style="display:none" onchange="loadBg(event)">
        </div>
    </aside>

    <main class="duel-tools-panel">
        <div class="players-lp-container">
            <div class="tool-card">
                <div style="font-family: var(--font-ygi); text-align: center; color: var(--ygo-gold);">DUELIST 1</div>
                <div id="lp1" class="lp-display" style="color: var(--terminal-green);">8000</div>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
                    <button onclick="changeLP(1, -1000)">-1k</button><button onclick="changeLP(1, -500)">-500</button>
                    <button onclick="changeLP(1, 1000)">+1k</button><button onclick="changeLP(1, 500)">+500</button>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;">
                    <input type="number" id="custom1" placeholder="Value...">
                    <button onclick="applyCustom(1, 1)" style="background:#151; color:#3f3;">+</button>
                    <button onclick="applyCustom(1, -1)" style="background:#611; color:#f33;">-</button>
                    <button onclick="halveLP(1)" class="btn-half">LP/2</button>
                </div>
            </div>
            <div class="tool-card">
                <div style="font-family: var(--font-ygi); text-align: center; color: var(--ygo-gold);">DUELIST 2</div>
                <div id="lp2" class="lp-display" style="color: var(--damage-red);">8000</div>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
                    <button onclick="changeLP(2, -1000)">-1k</button><button onclick="changeLP(2, -500)">-500</button>
                    <button onclick="changeLP(2, 1000)">+1k</button><button onclick="changeLP(2, 500)">+500</button>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;">
                    <input type="number" id="custom2" placeholder="Value...">
                    <button onclick="applyCustom(2, 1)" style="background:#151; color:#3f3;">+</button>
                    <button onclick="applyCustom(2, -1)" style="background:#611; color:#f33;">-</button>
                    <button onclick="halveLP(2)" class="btn-half">LP/2</button>
                </div>
            </div>
        </div>

        <div class="bottom-row">
            <div class="tool-card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="startDiceAnimation()">🎲 ROLL DICE</button>
                <button onclick="startCoinAnimation()">🪙 FLIP COIN</button>
            </div>
            
            <div class="tool-card timer-card">
                <div id="timer-display">40:00</div>
                <div class="timer-btns">
                    <button onclick="startTimer()">START</button><button onclick="pauseTimer()">PAUSE</button><button onclick="resetTimer()">RESET</button>
                </div>
            </div>

            <button onclick="resetLP()" class="btn-reset">RESET DUEL</button>
        </div>
    </main>
</div>

<div id="animation-modal" class="modal-overlay">
    <div id="res-text" style="font-family: var(--font-ygi); color: gold; font-size: 6rem; text-shadow: 0 0 40px gold; text-align: center;"></div>
    <div class="modal-actions">
        <button id="retry-btn" onclick="" style="padding: 15px 25px;">RE-ROLL</button>
        <button onclick="closeModal()" style="padding: 15px 25px; background: #444; color: #fff;">CLOSE</button>
    </div>
</div>

<script>
    let lp = { 1: 8000, 2: 8000 };
    let timerInterval, secondsLeft = 2400;

    function changeLP(p, a) {
        let start = lp[p]; lp[p] = Math.max(0, lp[p] + a);
        let curr = start; const step = (lp[p] - start) / 15;
        const interval = setInterval(() => {
            curr += step;
            if ((step > 0 && curr >= lp[p]) || (step < 0 && curr <= lp[p])) { curr = lp[p]; clearInterval(interval); }
            document.getElementById('lp'+p).innerText = Math.round(curr);
        }, 30);
    }
    function applyCustom(p, s) { 
        const v = parseInt(document.getElementById('custom'+p).value);
        if(!isNaN(v)) { changeLP(p, v*s); document.getElementById('custom'+p).value=''; }
    }
    function halveLP(p) { changeLP(p, -Math.floor(lp[p]/2)); }
    function resetLP() { lp={1:8000,2:8000}; document.getElementById('lp1').innerText=8000; document.getElementById('lp2').innerText=8000; }

    function updateTimerDisplay() {
        let m = Math.floor(secondsLeft / 60), s = secondsLeft % 60;
        document.getElementById('timer-display').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }
    function startTimer() { clearInterval(timerInterval); timerInterval = setInterval(() => { if(secondsLeft > 0) { secondsLeft--; updateTimerDisplay(); } }, 1000); }
    function pauseTimer() { clearInterval(timerInterval); }
    function resetTimer() { clearInterval(timerInterval); secondsLeft = 2400; updateTimerDisplay(); }

    function startDiceAnimation() {
        showModal(); document.getElementById('retry-btn').onclick = startDiceAnimation;
        let count = 0; const interval = setInterval(() => {
            document.getElementById('res-text').innerText = Math.floor(Math.random()*6)+1;
            if(count++ > 12) { clearInterval(interval); document.getElementById('res-text').innerText = "🎲 " + (Math.floor(Math.random()*6)+1); }
        }, 60);
    }
    function startCoinAnimation() {
        showModal(); document.getElementById('retry-btn').onclick = startCoinAnimation;
        document.getElementById('res-text').innerText = "⏳";
        setTimeout(() => { document.getElementById('res-text').innerText = "🪙 " + (Math.random() > 0.5 ? "HEADS" : "TAILS"); }, 600);
    }
    function showModal() { document.getElementById('animation-modal').style.display='flex'; }
    function closeModal() { document.getElementById('animation-modal').style.display='none'; }

    function loadBg(event) {
        const reader = new FileReader();
        reader.onload = (e) => { document.getElementById('bot-panel').style.backgroundImage = `url('${e.target.result}')`; localStorage.setItem('solemnBg', e.target.result); };
        reader.readAsDataURL(event.target.files[0]);
    }
    window.onload = () => { const saved = localStorage.getItem('solemnBg'); if (saved) document.getElementById('bot-panel').style.backgroundImage = `url('${saved}')`; };
    function openJudgeBot() { window.open("https://notebooklm.google.com/notebook/61ad4abe-21d0-40b3-bcac-a9f0b0c4bb8f", "_blank"); }
</script>
</body>
</html>
